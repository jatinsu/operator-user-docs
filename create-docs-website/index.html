<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentation</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
  :root {
    --sidebar-width: 280px;
    --bg: #ffffff;
    --sidebar-bg: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #656d76;
    --link: #0969da;
    --active-bg: #ddf4ff;
    --active-border: #0969da;
    --hover-bg: #eaeef2;
    --code-bg: #f6f8fa;
    --header-bg: #24292f;
    --header-text: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.6;
  }

  /* Header */
  .site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: var(--header-bg);
    color: var(--header-text);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
    font-size: 15px;
    font-weight: 600;
  }

  .site-header .title { cursor: pointer; }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 48px;
    left: 0;
    bottom: 0;
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
    z-index: 50;
  }

  .sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .sidebar li { margin: 0; }

  .sidebar a,
  .sidebar .folder-toggle {
    display: block;
    padding: 6px 16px 6px 20px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s, border-color 0.1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar a:hover,
  .sidebar .folder-toggle:hover {
    background: var(--hover-bg);
  }

  .sidebar a.active {
    background: var(--active-bg);
    border-left-color: var(--active-border);
    font-weight: 600;
  }

  .sidebar .folder-toggle {
    font-weight: 600;
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding-top: 12px;
    user-select: none;
  }

  .sidebar .folder-toggle::before {
    content: "\25B6";
    display: inline-block;
    margin-right: 6px;
    font-size: 10px;
    transition: transform 0.15s;
  }

  .sidebar .folder-toggle.open::before {
    transform: rotate(90deg);
  }

  .sidebar .folder-children { padding-left: 12px; }
  .sidebar .folder-children.collapsed { display: none; }

  /* Content area */
  .content {
    margin-left: var(--sidebar-width);
    margin-top: 48px;
    padding: 32px 48px 64px;
    max-width: 900px;
    min-height: calc(100vh - 48px);
  }

  /* Markdown styling */
  .content h1 { font-size: 2em; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .content h2 { font-size: 1.5em; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .content h3 { font-size: 1.25em; margin: 20px 0 10px; }
  .content h4 { font-size: 1em; margin: 16px 0 8px; }

  .content p { margin: 0 0 16px; }
  .content ul, .content ol { margin: 0 0 16px; padding-left: 2em; }
  .content li { margin: 4px 0; }

  .content a { color: var(--link); text-decoration: none; }
  .content a:hover { text-decoration: underline; }

  .content code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 85%;
    background: var(--code-bg);
    padding: 0.2em 0.4em;
    border-radius: 4px;
  }

  .content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    margin: 0 0 16px;
    line-height: 1.45;
  }

  .content pre code {
    background: transparent;
    padding: 0;
    font-size: 85%;
  }

  .content table {
    border-collapse: collapse;
    width: 100%;
    margin: 0 0 16px;
    font-size: 14px;
  }

  .content th, .content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }

  .content th { background: var(--code-bg); font-weight: 600; }
  .content tr:nth-child(even) { background: #f9fafb; }

  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .content blockquote {
    border-left: 4px solid var(--border);
    padding: 4px 16px;
    color: var(--text-muted);
    margin: 0 0 16px;
  }

  .content img { max-width: 100%; border-radius: 6px; }

  /* Loading state */
  .loading {
    color: var(--text-muted);
    font-style: italic;
    padding: 48px 0;
  }

  .error-msg {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 6px;
    padding: 16px;
    margin: 16px 0;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { width: 100%; height: auto; position: relative; top: 48px; border-right: none; border-bottom: 1px solid var(--border); }
    .content { margin-left: 0; padding: 24px 16px 48px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <span class="title" onclick="navigateTo('')">Documentation</span>
</header>

<nav class="sidebar" id="sidebar">
  <p style="padding: 16px; color: var(--text-muted); font-style: italic;">Loading navigation...</p>
</nav>

<main class="content" id="content">
  <div class="loading">Loading documentation...</div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script>
(function() {
  const CODE_EXTENSIONS = new Set(['.yaml', '.yml', '.json', '.toml', '.txt']);
  let manifest = null;
  let allPages = [];
  let currentPage = '';

  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    gfm: true,
    breaks: false,
  });

  function getPageFromUrl() {
    return new URLSearchParams(window.location.search).get('page') || '';
  }

  function setPageUrl(path) {
    const url = new URL(window.location);
    url.searchParams.set('page', path);
    url.hash = '';
    history.pushState({page: path}, '', url);
  }

  async function init() {
    try {
      const resp = await fetch('site-manifest.json');
      if (!resp.ok) throw new Error('Could not load site-manifest.json. Run generate-site.py first.');
      manifest = await resp.json();

      document.querySelector('.site-header .title').textContent = manifest.title || 'Documentation';
      document.title = manifest.title || 'Documentation';

      allPages = [];
      collectPages(manifest.pages, allPages);

      renderSidebar();

      let page = getPageFromUrl();
      if (!page) {
        const readme = allPages.find(p => p.name.toLowerCase() === 'readme.md' && !p.path.includes('/'));
        page = readme ? readme.path : (allPages[0] ? allPages[0].path : '');
      }
      if (page) {
        setPageUrl(page);
        loadPage(page);
      }
    } catch (err) {
      document.getElementById('content').innerHTML =
        '<div class="error-msg"><strong>Setup required</strong><br>' +
        'Run <code>python3 generate-site.py &lt;docs-directory&gt;</code> first, ' +
        'then serve this directory with a local web server.<br><br>' +
        'Error: ' + escapeHtml(err.message) + '</div>';
    }
  }

  function collectPages(items, out) {
    for (const item of items) {
      if (item.type === 'file') {
        out.push(item);
      } else if (item.type === 'directory' && item.children) {
        collectPages(item.children, out);
      }
    }
  }

  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '';
    const ul = document.createElement('ul');
    renderNavItems(manifest.pages, ul);
    sidebar.appendChild(ul);
  }

  function renderNavItems(items, parentEl) {
    for (const item of items) {
      if (item.type === 'file') {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '?page=' + encodeURIComponent(item.path);
        a.textContent = prettifyName(item.name, item.extension);
        a.dataset.path = item.path;
        a.addEventListener('click', function(e) {
          e.preventDefault();
          navigateTo(item.path);
        });
        li.appendChild(a);
        parentEl.appendChild(li);
      } else if (item.type === 'directory') {
        const li = document.createElement('li');
        const toggle = document.createElement('div');
        toggle.className = 'folder-toggle open';
        toggle.textContent = prettifyName(item.name);

        const childUl = document.createElement('ul');
        childUl.className = 'folder-children';

        toggle.addEventListener('click', function() {
          toggle.classList.toggle('open');
          childUl.classList.toggle('collapsed');
        });

        li.appendChild(toggle);
        renderNavItems(item.children, childUl);
        li.appendChild(childUl);
        parentEl.appendChild(li);
      }
    }
  }

  function prettifyName(filename, ext) {
    if (filename.toLowerCase() === 'readme.md') return 'Overview';
    let name = filename;
    if (ext) name = name.slice(0, -ext.length);
    return name
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function navigateTo(path) {
    if (!path) {
      const readme = allPages.find(p => p.name.toLowerCase() === 'readme.md' && !p.path.includes('/'));
      path = readme ? readme.path : (allPages[0] ? allPages[0].path : '');
    }
    if (path) {
      setPageUrl(path);
      loadPage(path);
    }
  }

  async function loadPage(path) {
    if (path === currentPage) return;
    currentPage = path;

    const contentEl = document.getElementById('content');
    contentEl.innerHTML = '<div class="loading">Loading...</div>';

    document.querySelectorAll('.sidebar a').forEach(a => {
      a.classList.toggle('active', a.dataset.path === path);
    });

    try {
      const resp = await fetch('content/' + path);
      if (!resp.ok) throw new Error('File not found: ' + path);
      const text = await resp.text();

      const page = allPages.find(p => p.path === path);
      const ext = page ? page.extension : getExtension(path);

      if (ext === '.md') {
        contentEl.innerHTML = marked.parse(text);
        addHeadingIds(contentEl);
        contentEl.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });
        interceptLinks(contentEl, path);
      } else if (CODE_EXTENSIONS.has(ext)) {
        const lang = ext.replace('.', '');
        const highlighted = hljs.getLanguage(lang)
          ? hljs.highlight(text, { language: lang }).value
          : escapeHtml(text);
        contentEl.innerHTML =
          '<h1>' + escapeHtml(path.split('/').pop()) + '</h1>' +
          '<pre><code class="hljs">' + highlighted + '</code></pre>';
      } else {
        contentEl.innerHTML = '<pre>' + escapeHtml(text) + '</pre>';
      }

      window.scrollTo(0, 0);
    } catch (err) {
      contentEl.innerHTML =
        '<div class="error-msg">Could not load <code>' +
        escapeHtml(path) + '</code><br>' + escapeHtml(err.message) + '</div>';
    }
  }

  function addHeadingIds(container) {
    container.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(function(h) {
      if (!h.id) {
        h.id = h.textContent.toLowerCase().trim()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-');
      }
    });
  }

  function interceptLinks(container, currentPath) {
    container.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (!href || href.startsWith('http') || href.startsWith('#') || href.startsWith('mailto:')) return;

      const resolved = resolveRelativePath(currentPath, href);
      const target = allPages.find(p => p.path === resolved);

      if (target) {
        a.href = '?page=' + encodeURIComponent(target.path);
        a.addEventListener('click', function(e) {
          e.preventDefault();
          navigateTo(target.path);
        });
      } else if (resolved.endsWith('/')) {
        const folderReadme = allPages.find(p =>
          p.path === resolved + 'README.md' || p.path === resolved + 'readme.md'
        );
        if (folderReadme) {
          a.href = '?page=' + encodeURIComponent(folderReadme.path);
          a.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(folderReadme.path);
          });
        }
      }
    });
  }

  function resolveRelativePath(from, to) {
    if (to.startsWith('/')) return to.slice(1);
    const fromParts = from.split('/');
    fromParts.pop();
    const toParts = to.split('/');
    for (const part of toParts) {
      if (part === '..') fromParts.pop();
      else if (part !== '.') fromParts.push(part);
    }
    return fromParts.join('/');
  }

  function getExtension(path) {
    const dot = path.lastIndexOf('.');
    return dot >= 0 ? path.slice(dot).toLowerCase() : '';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  window.addEventListener('popstate', function() {
    const page = getPageFromUrl();
    if (page && page !== currentPage) {
      loadPage(page);
    }
  });

  window.navigateTo = navigateTo;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
