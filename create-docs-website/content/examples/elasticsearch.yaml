# ClusterLogForwarder: Forwarding to Elasticsearch with authentication
#
# Forwards application logs to an external Elasticsearch 8.x cluster.
# Uses username/password authentication and a custom CA certificate for TLS.
# The index name is templated from the Kubernetes namespace.
#
# Prerequisites:
#   - A Secret named "es-credentials" in openshift-logging containing:
#       username, password, ca-bundle.crt
#   - A ServiceAccount named "logcollector"
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
spec:
  serviceAccount:
    name: logcollector
  outputs:
    - name: elasticsearch-out
      type: elasticsearch
      elasticsearch:
        url: "https://elasticsearch.example.com:9200"
        version: 8
        index: "logs-{.kubernetes.namespace_name||\"unknown\"}"
        authentication:
          username:
            key: username
            secretName: es-credentials
          password:
            key: password
            secretName: es-credentials
      tls:
        ca:
          key: ca-bundle.crt
          secretName: es-credentials
  pipelines:
    - name: app-logs
      inputRefs:
        - application
      outputRefs:
        - elasticsearch-out
