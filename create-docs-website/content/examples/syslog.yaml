# ClusterLogForwarder: Forwarding to syslog
#
# Forwards infrastructure logs to a remote syslog server over TLS using
# RFC 5424 format. Fields like severity, appName, procId, and msgId are
# templated from log record fields.
#
# Prerequisites:
#   - A syslog server reachable at syslog.example.com:6514 (TLS)
#   - A ServiceAccount named "logcollector"
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
spec:
  serviceAccount:
    name: logcollector
  outputs:
    - name: syslog-out
      type: syslog
      syslog:
        url: "tls://syslog.example.com:6514"
        rfc: RFC5424
        severity: "{.level||\"informational\"}"
        facility: "user"
        appName: "openshift"
        procId: "{.kubernetes.pod_name||\"unknown\"}"
        msgId: "{.log_type||\"unknown\"}"
  pipelines:
    - name: infra-to-syslog
      inputRefs:
        - infrastructure
      outputRefs:
        - syslog-out
