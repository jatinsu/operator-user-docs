name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "example-user-docs/**"
      - "create-docs-website/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate site from docs
        run: python3 create-docs-website/generate-site.py example-user-docs/
        working-directory: ${{ github.workspace }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: create-docs-website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
